name: console-debug-bundle
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: console-debug-bundle-php
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
      - coverage-data:/app/coverage
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - COMPOSER_ROOT_VERSION=1.0.0-dev
    command: ["tail", "-f", "/dev/null"]
    networks:
      - console-debug-bundle-network

volumes:
  composer-cache:
    driver: local
  coverage-data:
    driver: local

networks:
  console-debug-bundle-network:
    driver: bridge
